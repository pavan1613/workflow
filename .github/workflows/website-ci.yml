name: Portfolio Website CI

on:
  push:
    branches:
      - workflow-practise

  pull_request:
    branches:
      - workflow-practise

jobs:
  test-website:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest tests -v
